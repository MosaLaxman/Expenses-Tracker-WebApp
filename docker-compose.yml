version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: expenses-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: expenses_tracker
      MYSQL_USER: springstudent
      MYSQL_PASSWORD: springstudent
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: expenses-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      APP_PROFILE: prod
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://db:3306/expenses_tracker?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: springstudent
      DB_PASSWORD: springstudent
    restart: unless-stopped

volumes:
  mysql_data:
