<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-theme">
<div class="container page-shell py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="text-danger mb-3">Request Failed</h3>
                    <p class="mb-1" th:text="${errorMessage}">Something went wrong while processing your request.</p>
                    <p class="text-muted mb-4">
                        Path: <span th:text="${errorPath}">/unknown</span>
                    </p>
                    <a class="btn btn-primary" th:href="@{/list}">Back to Expenses</a>
                    <a class="btn btn-outline-secondary" th:href="@{/showLoginPage}">Sign In</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
