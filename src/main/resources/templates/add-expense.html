<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Add Expense</title>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/favicon.ico}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .expense-shell {
            padding-top: calc(var(--nav-offset, 92px) + 1rem);
            padding-bottom: 2rem;
            position: relative;
            z-index: 1;
        }
        .expense-shell::before {
            content: "";
            position: absolute;
            inset: 0 auto auto 0;
            width: 100%;
            height: 230px;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(70% 80% at 0% 0%, rgba(20, 184, 166, 0.18), rgba(20, 184, 166, 0));
        }
        .hero-card {
            border-radius: 20px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            background: linear-gradient(120deg, #0f766e 0%, #115e59 55%, #1d4ed8 100%);
            color: #ecfeff;
            box-shadow: 0 16px 34px rgba(15, 23, 42, 0.22);
        }
        .form-card {
            background: #fff;
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 18px;
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.1);
        }
        .form-card .form-label {
            font-weight: 600;
            color: #334155;
            margin-bottom: 0.35rem;
        }
        .form-card .form-control,
        .form-card .form-select {
            border-radius: 12px;
            border-color: #cbd5e1;
            padding: 0.7rem 0.85rem;
        }
        .form-card .form-control:focus,
        .form-card .form-select:focus {
            border-color: #0f766e;
            box-shadow: 0 0 0 0.2rem rgba(15, 118, 110, 0.12);
        }
        .hint {
            font-size: 0.88rem;
            color: #64748b;
        }
    </style>
</head>
<body class="app-theme">
<div th:replace="fragments/navbar :: navbar('no', 'no', 'no', 'yes', 'yes', 'yes')"></div>

<div class="container expense-shell">
    <div class="hero-card p-4 p-lg-5 mb-4">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
            <div>
                <h2 class="mb-2">Add Expense</h2>
                <p class="mb-0">Capture spending quickly and keep your tracking up to date.</p>
            </div>
            <a th:href="@{/list}" class="btn btn-light"><i class="fa-solid fa-list"></i> View Expenses</a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-8 col-xl-7">
            <div class="form-card p-4 p-lg-5">
                <form th:action="@{/submitAdd}" th:object="${expense}" method="post" class="row g-3">
                    <div class="col-12">
                        <label for="expenseCategory" class="form-label">Expense Category</label>
                        <select id="expenseCategory" class="form-select" th:field="*{category}" required>
                            <option value="groceries">Groceries</option>
                            <option value="Utilities(bills)">Utilities (bills)</option>
                            <option value="transportation">Transportation</option>
                            <option value="dining out">Dining Out</option>
                            <option value="entertainment">Entertainment</option>
                            <option value="shopping">Shopping</option>
                            <option value="travel">Travel</option>
                            <option value="education">Education</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label for="amount" class="form-label">Amount (INR)</label>
                        <input type="number" class="form-control" id="amount" th:field="*{amount}" min="1" placeholder="e.g. 1200" required>
                    </div>

                    <div class="col-md-6">
                        <label for="dateTime" class="form-label">Date & Time</label>
                        <input type="datetime-local" class="form-control" id="dateTime" th:field="*{dateTime}" required>
                    </div>

                    <div class="col-12">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" th:field="*{description}" rows="4" placeholder="Optional notes about this expense"></textarea>
                        <div class="hint mt-1">Tip: add context like vendor name or reason to improve monthly insights.</div>
                    </div>

                    <div class="col-12 d-flex gap-2 flex-wrap">
                        <button type="submit" class="btn btn-primary px-4"><i class="fa-solid fa-floppy-disk"></i> Save Expense</button>
                        <a th:href="@{/list}" class="btn btn-outline-secondary px-4">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
