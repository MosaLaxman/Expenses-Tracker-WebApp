<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Expenses</title>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/favicon.ico}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-shell { margin-top: 0; padding-top: calc(var(--nav-offset, 92px) + 0.9rem); }
        .soft-card { border: 0; border-radius: 14px; box-shadow: 0 8px 24px rgba(15, 23, 42, .08); }
        .metric-label { font-size: .78rem; letter-spacing: .04em; color: #64748b; text-transform: uppercase; }
        .metric-value { font-size: 1.4rem; font-weight: 700; color: #0f172a; }
        .compact { font-size: .92rem; }
        .header-actions .btn { min-width: 148px; }
        .report-controls select { min-width: 120px; }
        .filter-actions .btn { min-width: 120px; }
        .expense-actions .btn { min-width: 72px; }
        .receipt-upload input[type="file"] { min-width: 0; }

        @media (max-width: 767.98px) {
            .header-actions,
            .report-controls,
            .filter-actions {
                width: 100%;
            }
            .header-actions .btn,
            .report-controls .btn,
            .filter-actions .btn,
            .report-controls select {
                flex: 1 1 auto;
                min-width: 0;
            }
            .expense-actions {
                display: grid !important;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                width: 100%;
            }
            .receipt-upload {
                flex-direction: column;
            }
            .receipt-upload .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body class="app-theme">
<div th:replace="fragments/navbar :: navbar('no', 'no', 'no', 'yes', 'yes', 'yes')"></div>

<div class="container page-shell pb-5">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
        <div>
            <h3 class="mb-1">Expenses</h3>
            <div class="text-muted">Track, filter, and act on your spending quickly.</div>
        </div>
        <div class="d-flex gap-2 header-actions flex-wrap justify-content-start justify-content-md-end">
            <a th:href="@{/showAdd}" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Add Expense</a>
            <a th:href="@{/finance-hub}" class="btn btn-outline-secondary">Finance Hub</a>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4"><div class="card soft-card"><div class="card-body"><div class="metric-label">Total Spent</div><div class="metric-value" th:text="${'₹ ' + summaryTotalAmount}"></div></div></div></div>
        <div class="col-md-4"><div class="card soft-card"><div class="card-body"><div class="metric-label">Average / Max</div><div class="metric-value" th:text="${'₹ ' + summaryAverageAmount}"></div><div class="text-muted compact" th:text="${'Max: ₹ ' + summaryMaxAmount}"></div></div></div></div>
        <div class="col-md-4"><div class="card soft-card"><div class="card-body"><div class="metric-label">Top Category</div><div class="metric-value" th:text="${summaryTopCategory}"></div><div class="text-muted compact" th:text="${'₹ ' + summaryTopCategoryAmount + ' | This month: ₹ ' + summaryThisMonthAmount}"></div></div></div></div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-lg-8">
            <div class="card soft-card">
                <div class="card-body">
                    <h6 class="mb-3">Smart Filter</h6>
                    <form th:action="@{/processFilter}" th:object="${filter}" method="post" class="row g-2 align-items-end">
                        <div class="col-md-3">
                            <label class="form-label">Category</label>
                            <select class="form-select" th:field="*{category}">
                                <option value="all">All</option>
                                <option value="groceries">Groceries</option>
                                <option value="Utilities(bills)">Utilities (bills)</option>
                                <option value="transportation">Transportation</option>
                                <option value="dining out">Dining Out</option>
                                <option value="entertainment">Entertainment</option>
                                <option value="shopping">Shopping</option>
                                <option value="travel">Travel</option>
                                <option value="education">Education</option>
                            </select>
                        </div>
                        <div class="col-md-2"><label class="form-label">From</label><input class="form-control" type="number" th:field="*{from}"></div>
                        <div class="col-md-2"><label class="form-label">To</label><input class="form-control" type="number" th:field="*{to}"></div>
                        <div class="col-md-2"><label class="form-label">Month</label><select class="form-select" th:field="*{month}"><option value="all">All</option><option value="01">Jan</option><option value="02">Feb</option><option value="03">Mar</option><option value="04">Apr</option><option value="05">May</option><option value="06">Jun</option><option value="07">Jul</option><option value="08">Aug</option><option value="09">Sep</option><option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option></select></div>
                        <div class="col-md-3"><label class="form-label">Year</label><select class="form-select" th:field="*{year}"><option value="all">All</option><option value="2024">2024</option><option value="2025">2025</option><option value="2026">2026</option></select></div>
                        <div class="col-md-3"><label class="form-label">Keyword</label><input class="form-control" th:field="*{keyword}" placeholder="Description"></div>
                        <div class="col-md-3"><label class="form-label">Date Preset</label><select class="form-select" th:field="*{datePreset}"><option value="all">All</option><option value="today">Today</option><option value="thisWeek">This week</option><option value="thisMonth">This month</option></select></div>
                        <div class="col-md-3"><label class="form-label">Sort</label><select class="form-select" th:field="*{sortBy}"><option value="dateDesc">Newest</option><option value="dateAsc">Oldest</option><option value="amountDesc">Amount high-low</option><option value="amountAsc">Amount low-high</option></select></div>
                        <div class="col-12 col-md-3 d-flex gap-2 filter-actions">
                            <button class="btn btn-success w-100">Apply</button>
                            <a th:href="@{/list}" class="btn btn-outline-secondary w-100">Reset</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card soft-card mb-3">
                <div class="card-body">
                    <h6 class="mb-3">Quick Add</h6>
                    <form th:action="@{/quickAdd}" method="post" class="row g-2">
                        <div class="col-7">
                            <select class="form-select" name="category">
                                <option value="groceries">Groceries</option><option value="Utilities(bills)">Utilities</option><option value="transportation">Transportation</option><option value="dining out">Dining Out</option><option value="entertainment">Entertainment</option><option value="shopping">Shopping</option><option value="travel">Travel</option><option value="education">Education</option>
                            </select>
                        </div>
                        <div class="col-5"><input class="form-control" name="amount" type="number" min="1" placeholder="Amount" required></div>
                        <div class="col-12"><button class="btn btn-primary w-100">Add in 1 Click</button></div>
                    </form>
                </div>
            </div>
            <div class="card soft-card">
                <div class="card-body">
                    <h6 class="mb-3">Templates</h6>
                    <form th:action="@{/saveTemplate}" th:object="${templateForm}" method="post" class="row g-2 mb-2">
                        <div class="col-6"><input class="form-control" th:field="*{name}" placeholder="Name" required></div>
                        <div class="col-6"><input class="form-control" type="number" th:field="*{defaultAmount}" placeholder="Amount" required min="1"></div>
                        <div class="col-12"><select class="form-select" th:field="*{category}"><option value="groceries">Groceries</option><option value="Utilities(bills)">Utilities</option><option value="transportation">Transportation</option><option value="dining out">Dining Out</option><option value="entertainment">Entertainment</option><option value="shopping">Shopping</option><option value="travel">Travel</option><option value="education">Education</option></select></div>
                        <div class="col-12"><input class="form-control" th:field="*{defaultDescription}" placeholder="Description"></div>
                        <div class="col-12"><button class="btn btn-outline-primary w-100">Save Template</button></div>
                    </form>
                    <div class="d-flex flex-wrap gap-2 mt-2">
                        <a th:each="tpl : ${templates}" th:href="@{/applyTemplate(templateId=${tpl.id})}" class="btn btn-sm btn-outline-success" th:text="${tpl.name}"></a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="mb-0">Expenses List</h6>
        <div class="d-flex gap-2 align-items-center report-controls flex-wrap">
            <select class="form-select form-select-sm" id="reportFormat">
                <option value="csv">CSV</option>
                <option value="json">JSON</option>
                <option value="pdf">PDF</option>
            </select>
            <button class="btn btn-outline-success btn-sm" id="downloadReportBtn"><i class="fa-solid fa-download"></i> Download Report</button>
        </div>
    </div>
    <div class="card soft-card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Category</th><th>Amount</th><th>Date</th><th>Description</th><th style="width: 280px;">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(expenseList)}"><td colspan="5" class="text-center text-muted py-4">No expenses found for current criteria.</td></tr>
                    <tr th:each="exp : ${expenseList}">
                        <td th:text="${exp.categoryName}"></td>
                        <td th:text="${'₹ ' + exp.amount}"></td>
                        <td><div th:text="${exp.date}"></div><small class="text-muted" th:text="${exp.time}"></small></td>
                        <td th:text="${exp.description}"></td>
                        <td>
                            <div class="d-flex flex-wrap gap-1 expense-actions">
                                <a th:href="@{/showUpdate(expId=${exp.id})}" class="btn btn-sm btn-outline-primary">Edit</a>
                                <a th:href="@{/duplicate(expId=${exp.id})}" class="btn btn-sm btn-outline-secondary">Duplicate</a>
                                <a th:href="@{/delete(expId=${exp.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this expense?')">Delete</a>
                                <a th:if="${exp.receiptPath != null}" th:href="@{/receipt(expId=${exp.id})}" class="btn btn-sm btn-outline-dark">Receipt</a>
                            </div>
                            <form th:action="@{/uploadReceipt(expId=${exp.id})}" method="post" enctype="multipart/form-data" class="mt-1 d-flex gap-1 receipt-upload">
                                <input type="file" name="receiptFile" class="form-control form-control-sm" required>
                                <button class="btn btn-sm btn-outline-info">Upload</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('downloadReportBtn')?.addEventListener('click', function () {
        const params = new URLSearchParams();
        const bind = [
            ['category', '[name="category"]'],
            ['from', '[name="from"]'],
            ['to', '[name="to"]'],
            ['month', '[name="month"]'],
            ['year', '[name="year"]'],
            ['keyword', '[name="keyword"]'],
            ['sortBy', '[name="sortBy"]'],
            ['datePreset', '[name="datePreset"]']
        ];
        bind.forEach(([k, selector]) => {
            const el = document.querySelector(selector);
            if (el && el.value) params.set(k, el.value);
        });
        const format = document.getElementById('reportFormat')?.value || 'csv';
        window.location.href = '/reports/expenses.' + format + '?' + params.toString();
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
