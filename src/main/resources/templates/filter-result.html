<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Filtered Results</title>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/favicon.ico}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-shell { padding-top: calc(var(--nav-offset, 92px) + 0.9rem); }
        .soft-card { border: 0; border-radius: 14px; box-shadow: 0 8px 24px rgba(15, 23, 42, .08); }
    </style>
</head>
<body class="app-theme">
<div th:replace="fragments/navbar :: navbar('no', 'no', 'no', 'yes', 'yes', 'yes')"></div>

<div class="container page-shell pb-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0">Filtered Results</h3>
        <a th:href="@{/list}" class="btn btn-outline-secondary">Back to List</a>
    </div>

    <div class="row g-3 mb-3">
        <div class="col-md-4"><div class="card soft-card"><div class="card-body"><div class="text-muted">Total</div><h4 th:text="${'₹ ' + summaryTotalAmount}"></h4></div></div></div>
        <div class="col-md-4"><div class="card soft-card"><div class="card-body"><div class="text-muted">Average / Max</div><h5 th:text="${'₹ ' + summaryAverageAmount + ' avg'}"></h5><div th:text="${'₹ ' + summaryMaxAmount + ' max'}"></div></div></div></div>
        <div class="col-md-4"><div class="card soft-card"><div class="card-body"><div class="text-muted">Top Category</div><h5 th:text="${summaryTopCategory}"></h5><div th:text="${'₹ ' + summaryTopCategoryAmount + ' | This month: ₹ ' + summaryThisMonthAmount}"></div></div></div></div>
    </div>

    <div class="card soft-card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light"><tr><th>Category</th><th>Amount</th><th>Date</th><th>Description</th><th>Actions</th></tr></thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(expenseList)}"><td colspan="5" class="text-center text-muted py-4">No expenses found.</td></tr>
                    <tr th:each="exp : ${expenseList}">
                        <td th:text="${exp.categoryName}"></td>
                        <td th:text="${'₹ ' + exp.amount}"></td>
                        <td><div th:text="${exp.date}"></div><small class="text-muted" th:text="${exp.time}"></small></td>
                        <td th:text="${exp.description}"></td>
                        <td class="d-flex gap-1">
                            <a th:href="@{/showUpdate(expId=${exp.id})}" class="btn btn-sm btn-outline-primary">Edit</a>
                            <a th:href="@{/delete(expId=${exp.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this expense?')">Delete</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
