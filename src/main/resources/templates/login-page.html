<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In</title>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/favicon.ico}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .login-wrap {
            min-height: calc(100vh - var(--nav-offset, 92px));
            display: grid;
            align-items: center;
            padding: 1.25rem 0 2rem;
        }
        .auth-card {
            border: 1px solid rgba(15, 23, 42, .08);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 18px 38px rgba(15, 23, 42, .12);
            background: #fff;
        }
        .brand-panel {
            background: linear-gradient(135deg, #0f766e 0%, #0f4c81 100%);
            color: #ecfeff;
            padding: 2rem;
            height: 100%;
        }
        .brand-panel h2 { font-size: 1.8rem; margin-bottom: .75rem; }
        .brand-panel p { opacity: .9; margin-bottom: 0; }
        .auth-content {
            padding: 2rem;
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        }
        .auth-content .form-control {
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            padding: .75rem .9rem;
        }
        .auth-content .form-control:focus {
            border-color: #0f766e;
            box-shadow: 0 0 0 .2rem rgba(15,118,110,.12);
        }
        .auth-content .btn-primary {
            border-radius: 12px;
            font-weight: 600;
            padding: .72rem .9rem;
        }
        @media (max-width: 991.98px) {
            .brand-panel {
                border-bottom: 1px solid rgba(255,255,255,.2);
            }
            .auth-content,
            .brand-panel {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body class="app-theme">
<div th:replace="fragments/navbar :: navbar('no', 'yes', 'yes', 'no', 'no', 'no')"></div>

<section class="container auth-shell login-wrap">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-10">
            <div class="auth-card">
                <div class="row g-0">
                    <div class="col-lg-5">
                        <div class="brand-panel d-flex flex-column justify-content-center">
                            <h2>Welcome Back</h2>
                            <p>Sign in to manage expenses, track budgets, and view insights from your Finance Hub.</p>
                        </div>
                    </div>
                    <div class="col-lg-7">
                        <div class="auth-content">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div>
                                    <h3 class="mb-1">Sign In</h3>
                                    <p class="text-muted mb-0">No account? <a th:href="@{/showRegistrationForm}">Create one</a></p>
                                </div>
                            </div>

                            <div th:if="${param.error}" class="alert alert-danger" role="alert">Invalid username or password.</div>
                            <div th:if="${param.logout}" class="alert alert-success" role="alert">You have been logged out.</div>
                            <div th:if="${param.registrationSuccess}" class="alert alert-success" role="alert">Registration successful. Please sign in.</div>

                            <form th:action="@{/authenticateTheUser}" method="post" class="row g-3 mt-1">
                                <div class="col-12">
                                    <label for="userName" class="form-label">Username</label>
                                    <input type="text" class="form-control" name="username" id="userName" placeholder="Enter username" required>
                                </div>
                                <div class="col-12">
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" class="form-control" name="password" id="password" placeholder="Enter password" required>
                                </div>
                                <div class="col-12 d-flex justify-content-between align-items-center">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="" name="remember_me" id="remember_me">
                                        <label class="form-check-label text-secondary" for="remember_me">Remember me</label>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <button class="btn btn-primary w-100" type="submit">Log In</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
