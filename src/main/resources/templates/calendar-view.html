<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar View</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-theme">
<div th:replace="fragments/navbar :: navbar('no', 'no', 'no', 'yes', 'yes', 'yes')"></div>
<div class="container page-shell">
    <h3>Calendar View - <span th:text="${monthKey}"></span></h3>
    <div class="accordion" id="calendarAccordion">
        <div class="accordion-item" th:each="entry, stat : ${calendarGroupedExpenses}">
            <h2 class="accordion-header" th:id="'heading' + ${stat.index}">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                        th:data-bs-target="'#collapse' + ${stat.index}">
                    <span th:text="${entry.key}"></span>
                </button>
            </h2>
            <div th:id="'collapse' + ${stat.index}" class="accordion-collapse collapse" data-bs-parent="#calendarAccordion">
                <div class="accordion-body">
                    <ul>
                        <li th:each="exp : ${entry.value}">
                            <strong th:text="${exp.category != null ? exp.category.name : 'Uncategorized'}"></strong> -
                            <span th:text="${'₹ ' + exp.amount}"></span> -
                            <span th:text="${exp.description}"></span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
